<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner Roulette | Mini Project 2</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <h1>🍽️ Dinner Roulette</h1>
        <p>Can't decide? Let the app choose your next meal.</p>

        <div class="input-group">
            <input type="text" id="restaurantInput" placeholder="Enter a restaurant name...">
            <button id="addBtn">Add to List</button>
        </div>

        <div class="list-container">
            <h3>Your Options:</h3>
            <ul id="restaurantList">
                <li class="empty-msg">No restaurants added yet...</li>
            </ul>
        </div>

        <div class="actions">
            <button id="spinBtn" class="primary-btn">🎰 SPIN THE WHEEL</button>
            <button id="resetBtn" class="secondary-btn">Reset All</button>
        </div>

        <div id="winnerDisplay" class="hidden">
            <h2>The Winner Is:</h2>
            <div id="winnerName"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
